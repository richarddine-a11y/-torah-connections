<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Torah Connections | קשרי תורה</title>

  <!-- PWA / Install support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#450F1A">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Apple / iPhone specific -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Torah Connections">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --parchment:       #F6EDD9;
      --parchment-mid:   #EFE0BC;
      --parchment-dark:  #DECA96;
      --parchment-light: #FDF8EE;
      --ink:             #1C1008;
      --ink-mid:         #3D2B1F;
      --ink-soft:        #6B5042;
      --wine:            #6B1A2A;
      --wine-dark:       #450F1A;
      --gold:            #B8860B;
      --gold-light:      #D4A843;
      --cat-yellow-bg:   #FAE58A;
      --cat-green-bg:    #B7DFB8;
      --cat-blue-bg:     #B3CBEE;
      --cat-purple-bg:   #D8BAF0;
      --radius:          7px;
      --shadow:          0 2px 10px rgba(28,16,8,0.12);
      --safe-top:        env(safe-area-inset-top, 0px);
      --safe-bottom:     env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      background-color: var(--parchment-light);
      background-image:
        radial-gradient(ellipse 70% 50% at 15% 10%, rgba(184,134,11,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 85% 90%, rgba(107,26,42,0.07) 0%, transparent 70%);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100%;
      padding-bottom: calc(3rem + var(--safe-bottom));
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(150deg, var(--wine) 0%, var(--wine-dark) 100%);
      color: var(--parchment);
      padding: calc(1.4rem + var(--safe-top)) 1.25rem 1.2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(-55deg, transparent, transparent 18px,
        rgba(255,255,255,0.018) 18px, rgba(255,255,255,0.018) 36px);
      pointer-events: none;
    }
    .site-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.35rem, 4.5vw, 2rem);
      font-weight: 600; letter-spacing: 0.07em;
      color: var(--gold-light);
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
      position: relative;
    }
    .site-name-heb { font-family: 'Frank Ruhl Libre', serif; font-size: 0.78em; letter-spacing: 0; opacity: 0.85; }
    .header-parasha { font-family: 'Frank Ruhl Libre', serif; font-size: clamp(1rem,3vw,1.15rem); color: var(--parchment); margin-top: 0.3rem; position: relative; }
    .header-meta { font-size: 0.82rem; color: rgba(246,237,217,0.7); font-style: italic; margin-top: 0.2rem; position: relative; }

    /* ── Main ── */
    main { max-width: 620px; margin: 0 auto; padding: 1.5rem 1rem 0; }
    .tagline { text-align: center; color: var(--ink-soft); font-size: 0.95rem; font-style: italic; margin-bottom: 1.1rem; }

    /* ── Game card ── */
    .game-card { background: var(--parchment); border: 1px solid var(--parchment-dark); border-radius: 12px; padding: 1rem 1rem 1.1rem; box-shadow: var(--shadow); }
    #solved-rows { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 0.45rem; }
    .solved-row { border-radius: var(--radius); padding: 0.7rem 1rem 0.6rem; animation: rowSlideIn 0.45s cubic-bezier(0.22,1,0.36,1); }
    @keyframes rowSlideIn { from { opacity:0; transform:translateY(-10px) scale(0.98); } to { opacity:1; transform:none; } }
    .solved-row-name { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .solved-row-words { font-family: 'Frank Ruhl Libre', serif; font-size: 1rem; margin-top: 0.1rem; opacity: 0.85; }
    .solved-row-explanation { font-family: 'EB Garamond', serif; font-size: 0.88rem; line-height: 1.5; margin-top: 0.45rem; padding-top: 0.45rem; border-top: 1px solid rgba(0,0,0,0.12); opacity: 0.82; }
    .cat-yellow { background: var(--cat-yellow-bg); color: var(--ink); }
    .cat-green  { background: var(--cat-green-bg);  color: var(--ink); }
    .cat-blue   { background: var(--cat-blue-bg);   color: var(--ink); }
    .cat-purple { background: var(--cat-purple-bg); color: var(--ink); }
    .cat-yellow .solved-row-name { color: #7a5a00; }
    .cat-green  .solved-row-name { color: #1e4d26; }
    .cat-blue   .solved-row-name { color: #163566; }
    .cat-purple .solved-row-name { color: #3d1660; }
    .cat-yellow .solved-row-explanation { border-top-color: rgba(122,90,0,0.2); }
    .cat-green  .solved-row-explanation { border-top-color: rgba(30,77,38,0.2); }
    .cat-blue   .solved-row-explanation { border-top-color: rgba(22,53,102,0.2); }
    .cat-purple .solved-row-explanation { border-top-color: rgba(61,22,96,0.2); }

    /* ── Word grid ── */
    #word-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 0.42rem; }
    .word-card {
      background: var(--parchment-light);
      border: 1.5px solid var(--parchment-dark);
      border-radius: var(--radius);
      cursor: pointer;
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
      padding: 0.45rem 0.2rem; min-height: 56px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(0.72rem, 2.2vw, 0.95rem);
      line-height: 1.25; color: var(--ink); text-align: center;
      transition: background 0.12s, border-color 0.12s, transform 0.1s, box-shadow 0.12s;
      box-shadow: 0 1px 3px rgba(28,16,8,0.08);
      -webkit-tap-highlight-color: transparent;
    }
    .word-card:active { background: var(--parchment-mid); }
    @media (hover:hover) { .word-card:hover { background:var(--parchment-mid); transform:translateY(-1px); box-shadow:0 3px 8px rgba(28,16,8,0.14); } }
    .word-card.selected { background: var(--ink-mid); color: var(--parchment-light); border-color: var(--ink-mid); box-shadow: 0 2px 8px rgba(28,16,8,0.28); }
    .word-card.shake { animation: shake 0.42s ease; }
    .word-card.pop   { animation: pop   0.35s ease; }
    @keyframes shake {
      0%,100% { transform:translateX(0); background:var(--parchment-light); }
      15% { transform:translateX(-5px); background:#ffe0e0; border-color:#cc4444; }
      35% { transform:translateX(5px); } 55% { transform:translateX(-3px); } 75% { transform:translateX(3px); }
    }
    @keyframes pop { 0% { transform:scale(1); } 40% { transform:scale(1.07); } 100% { transform:scale(1); } }

    /* ── Mistakes & controls ── */
    .mistakes-row { display:flex; align-items:center; gap:0.65rem; margin-top:0.95rem; font-size:0.88rem; color:var(--ink-soft); }
    .mistake-dots { display:flex; gap:0.38rem; }
    .mdot { width:13px; height:13px; border-radius:50%; background:var(--ink-mid); transition:background 0.3s,transform 0.2s; }
    .mdot.spent { background:var(--parchment-dark); transform:scale(0.85); }
    .controls { display:flex; align-items:center; justify-content:space-between; gap:0.65rem; margin-top:0.95rem; flex-wrap:wrap; }
    .btn-group { display:flex; gap:0.45rem; }
    .btn {
      font-family: 'EB Garamond', serif; font-size:0.95rem; letter-spacing:0.02em;
      padding:0.42rem 1.05rem; border-radius:20px; border:1.5px solid var(--ink-mid);
      background:transparent; color:var(--ink); cursor:pointer; min-height:44px;
      -webkit-tap-highlight-color:transparent;
      transition:background 0.14s, color 0.14s, opacity 0.14s;
    }
    @media (hover:hover) { .btn:hover:not(:disabled) { background:var(--ink-mid); color:var(--parchment-light); } }
    .btn:disabled { opacity:0.38; cursor:not-allowed; }
    .btn-submit { background:var(--wine); border-color:var(--wine); color:var(--parchment-light); font-weight:500; }
    @media (hover:hover) { .btn-submit:hover:not(:disabled) { background:var(--wine-dark); border-color:var(--wine-dark); } }

    /* ── Toast ── */
    #toast {
      position:fixed; top:calc(1.25rem + var(--safe-top)); left:50%;
      transform:translateX(-50%) translateY(-70px);
      background:var(--ink); color:var(--parchment-light);
      padding:0.55rem 1.4rem; border-radius:6px; font-size:0.9rem; font-style:italic;
      z-index:200; opacity:0; transition:transform 0.28s ease-out, opacity 0.28s;
      white-space:nowrap; pointer-events:none;
    }
    #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    /* ── Result ── */
    #game-result { min-height:1.6rem; text-align:center; margin-top:1.1rem; font-size:1.05rem; font-style:italic; color:var(--wine); }

    /* ── Ornament ── */
    .ornament { text-align:center; margin:2rem 0 1.5rem; color:var(--gold); font-size:1.15rem; letter-spacing:0.35em; opacity:0.75; }

    /* ── Reflection section ── */
    .reflection-section {
      background: var(--parchment);
      border: 1px solid var(--parchment-dark);
      border-left: 4px solid var(--gold);
      border-radius: 0 10px 10px 0;
      padding: 1.4rem 1.4rem 1.5rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
    }
    .reflection-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gold); opacity: 0.85; margin-bottom: 0.5rem;
    }
    .reflection-question {
      font-family: 'EB Garamond', serif;
      font-size: 1.08rem; line-height: 1.65;
      color: var(--ink-mid); margin-bottom: 1.1rem;
      font-style: italic;
    }
    .reflection-name-row {
      display: flex; gap: 0.6rem; margin-bottom: 0.6rem; align-items: center;
    }
    .reflection-name-label {
      font-family: 'EB Garamond', serif; font-size: 0.92rem;
      color: var(--ink-soft); white-space: nowrap;
    }
    .reflection-name-input {
      font-family: 'EB Garamond', serif; font-size: 0.95rem;
      padding: 0.38rem 0.7rem; border-radius: var(--radius);
      border: 1.5px solid var(--parchment-dark);
      background: var(--parchment-light); color: var(--ink);
      flex: 1; min-width: 0;
      transition: border-color 0.15s;
    }
    .reflection-name-input:focus { outline: none; border-color: var(--gold); }
    .reflection-textarea {
      width: 100%;
      font-family: 'EB Garamond', serif; font-size: 1rem; line-height: 1.6;
      padding: 0.65rem 0.8rem;
      border-radius: var(--radius);
      border: 1.5px solid var(--parchment-dark);
      background: var(--parchment-light); color: var(--ink);
      resize: vertical; min-height: 110px;
      transition: border-color 0.15s;
    }
    .reflection-textarea:focus { outline: none; border-color: var(--gold); }
    .reflection-textarea::placeholder { color: var(--ink-soft); opacity: 0.6; font-style: italic; }
    .reflection-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.75rem; margin-top: 0.75rem; flex-wrap: wrap;
    }
    .reflection-note {
      font-family: 'EB Garamond', serif; font-size: 0.82rem;
      color: var(--ink-soft); font-style: italic; flex: 1;
    }
    .btn-reflect {
      font-family: 'EB Garamond', serif; font-size: 0.95rem;
      padding: 0.45rem 1.3rem; border-radius: 20px; min-height: 44px;
      background: var(--gold); border: 1.5px solid var(--gold);
      color: var(--ink); font-weight: 500; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.14s, opacity 0.14s;
      white-space: nowrap;
    }
    @media (hover:hover) { .btn-reflect:hover:not(:disabled) { background: var(--gold-light); } }
    .btn-reflect:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Submission states */
    .reflection-submitted {
      text-align: center; padding: 1rem 0 0.25rem;
      font-family: 'EB Garamond', serif; font-size: 1.05rem;
      color: var(--ink-mid); font-style: italic; line-height: 1.6;
    }
    .reflection-submitted .checkmark {
      display: block; font-size: 1.6rem; margin-bottom: 0.4rem;
    }

    /* ── Dvar Torah ── */
    .dvar-section {
      background: var(--parchment);
      border: 1px solid var(--parchment-dark);
      border-left: 4px solid var(--wine);
      border-radius: 0 10px 10px 0;
      padding: 1.4rem 1.4rem 1.5rem;
      box-shadow: var(--shadow);
    }
    .dvar-eyebrow { font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--wine); opacity:0.75; margin-bottom:0.25rem; }
    .dvar-heb-title { font-family:'Frank Ruhl Libre',serif; font-size:1.35rem; color:var(--wine); direction:rtl; line-height:1.3; }
    .dvar-eng-title { font-family:'Cinzel',serif; font-size:0.98rem; color:var(--ink-mid); margin-top:0.2rem; font-weight:400; letter-spacing:0.03em; }
    .dvar-body { margin-top:1rem; font-size:1.05rem; line-height:1.78; color:var(--ink-mid); }
    .dvar-body p { margin-bottom:0.95rem; }
    .dvar-body p:last-child { margin-bottom:0; }
    .dvar-body .heb { font-family:'Frank Ruhl Libre',serif; font-size:1.1em; }
    .dvar-body em { font-style:italic; }

    /* ── Footer ── */
    footer { text-align:center; margin-top:3rem; padding:0 1rem; color:rgba(28,16,8,0.35); font-size:0.78rem; font-style:italic; }

    /* ── Responsive ── */
    @media (max-width:460px) {
      .word-card { min-height:52px; font-size:0.72rem; }
      #word-grid  { gap:0.32rem; }
      .controls   { flex-direction:column; align-items:stretch; }
      .btn-group  { justify-content:center; }
      .btn-submit { text-align:center; }
      .mistakes-row { justify-content:center; }
      .reflection-name-row { flex-direction:column; align-items:stretch; }
      .reflection-footer { flex-direction:column; align-items:stretch; }
      .btn-reflect { text-align:center; }
    }
  </style>
</head>
<body>

<div id="toast" role="status" aria-live="polite"></div>

<header>
  <div class="site-name">Torah Connections &thinsp;·&thinsp; <span class="site-name-heb">קשרי תורה</span></div>
  <div class="header-parasha" id="hdr-parasha">Loading…</div>
  <div class="header-meta"    id="hdr-meta"></div>
</header>

<main>
  <p class="tagline">Find four groups of four words that share a connection.</p>

  <!-- Game -->
  <div class="game-card">
    <div id="solved-rows"></div>
    <div id="word-grid"></div>
    <div class="mistakes-row">
      <span>Mistakes remaining:</span>
      <div class="mistake-dots" id="mistake-dots">
        <div class="mdot" id="mdot-0"></div>
        <div class="mdot" id="mdot-1"></div>
        <div class="mdot" id="mdot-2"></div>
        <div class="mdot" id="mdot-3"></div>
      </div>
    </div>
    <div class="controls">
      <div class="btn-group">
        <button class="btn" id="btn-shuffle"  onclick="shuffleGrid()">Shuffle</button>
        <button class="btn" id="btn-deselect" onclick="deselectAll()" disabled>Deselect</button>
      </div>
      <button class="btn btn-submit" id="btn-submit" onclick="submitGuess()" disabled>Submit</button>
    </div>
  </div>

  <div id="game-result" role="status" aria-live="polite"></div>

  <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>

  <!-- Reflection -->
  <section class="reflection-section" id="reflection-section" aria-label="Reflection Question">
    <div class="reflection-eyebrow">Question for Reflection</div>
    <p class="reflection-question" id="reflection-question"></p>
    <div id="reflection-form-area">
      <div class="reflection-name-row">
        <label class="reflection-name-label" for="reflect-name">Your name <em style="font-size:0.82rem;opacity:0.7">(optional)</em></label>
        <input class="reflection-name-input" id="reflect-name" type="text" placeholder="e.g. Miriam" autocomplete="name">
      </div>
      <textarea class="reflection-textarea" id="reflect-text"
        placeholder="Share your thoughts…" aria-label="Your reflection"></textarea>
      <div class="reflection-footer">
        <span class="reflection-note">Your response will be sent to the puzzle author.</span>
        <button class="btn-reflect" id="btn-reflect" onclick="submitReflection()">Send Reflection</button>
      </div>
    </div>
  </section>

  <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>

  <!-- Dvar Torah -->
  <section class="dvar-section" aria-label="Dvar Torah">
    <div class="dvar-eyebrow">Dvar Torah</div>
    <div class="dvar-heb-title" id="dvar-heb-title">דבר תורה</div>
    <div class="dvar-eng-title" id="dvar-eng-title"></div>
    <div class="dvar-body"      id="dvar-body"></div>
  </section>
</main>

<footer id="footer-txt"></footer>

<script src="current-puzzle.js"></script>
<script>
"use strict";

// ── Formspree endpoint ──────────────────────────────────────────
const FORMSPREE_URL = "https://formspree.io/f/xojydpvl";

// ── Game state ──────────────────────────────────────────────────
const STATE = {
  words:[], selected:new Set(), solvedCats:new Set(),
  mistakes:0, MAX_MISTAKES:4, over:false
};
const COLOR_CLASS = { yellow:'cat-yellow', green:'cat-green', blue:'cat-blue', purple:'cat-purple' };

// ── Init ────────────────────────────────────────────────────────
function init() {
  if (typeof PUZZLE === 'undefined') {
    document.getElementById('word-grid').innerHTML =
      '<p style="padding:1.5rem;text-align:center;color:var(--wine);grid-column:1/-1">Puzzle data not found.</p>';
    return;
  }
  document.getElementById('hdr-parasha').textContent =
    [PUZZLE.hebrewWeek, PUZZLE.week].filter(Boolean).join('  ·  ');
  document.getElementById('hdr-meta').textContent =
    [PUZZLE.date, PUZZLE.parasha, PUZZLE.haftarah].filter(Boolean).join('  |  ');
  document.title = `Torah Connections — ${PUZZLE.week || 'Weekly Puzzle'}`;

  const words = [];
  PUZZLE.categories.forEach((cat, ci) =>
    cat.words.forEach(text => words.push({ id:words.length, text, catIdx:ci, solved:false })));
  STATE.words = shuffle(words);
  renderGrid();
  syncMistakes();

  // Reflection question
  const rq = document.getElementById('reflection-question');
  if (PUZZLE.reflectionQuestion) {
    rq.textContent = PUZZLE.reflectionQuestion;
  } else {
    document.getElementById('reflection-section').style.display = 'none';
  }

  // Dvar Torah
  const dt = PUZZLE.dvarTorah || {};
  if (dt.hebrewTitle) document.getElementById('dvar-heb-title').textContent = dt.hebrewTitle;
  if (dt.title)       document.getElementById('dvar-eng-title').textContent = dt.title;
  if (dt.text)        document.getElementById('dvar-body').innerHTML = dt.text;

  document.getElementById('footer-txt').textContent =
    ['Torah Connections', PUZZLE.week, PUZZLE.date].filter(Boolean).join('  ·  ');
}

// ── Reflection submission ───────────────────────────────────────
async function submitReflection() {
  const name = document.getElementById('reflect-name').value.trim();
  const text = document.getElementById('reflect-text').value.trim();
  const btn  = document.getElementById('btn-reflect');

  if (!text) {
    toast('Please write something before sending.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const res = await fetch(FORMSPREE_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        name:     name || '(anonymous)',
        week:     PUZZLE.week  || '',
        date:     PUZZLE.date  || '',
        question: PUZZLE.reflectionQuestion || '',
        message:  text
      })
    });

    const formArea = document.getElementById('reflection-form-area');
    if (res.ok) {
      formArea.innerHTML = `
        <div class="reflection-submitted">
          <span class="checkmark">✦</span>
          Thank you${name ? ', ' + safe(name) : ''} — your reflection has been sent.<br>
          <span style="font-size:0.9rem;opacity:0.7">Shabbat Shalom.</span>
        </div>`;
    } else {
      btn.disabled = false;
      btn.textContent = 'Send Reflection';
      toast('Something went wrong — please try again.');
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Send Reflection';
    toast('Could not send — please check your connection.');
  }
}

// ── Game logic ──────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('word-grid');
  const visible = STATE.words.filter(w => !w.solved);
  if (!visible.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = visible.map(w =>
    `<div class="word-card${STATE.selected.has(w.id)?' selected':''}"
      id="wc-${w.id}" onclick="toggleWord(${w.id})"
      role="button" aria-pressed="${STATE.selected.has(w.id)}" tabindex="0">
      ${safe(w.text)}</div>`).join('');
  grid.querySelectorAll('.word-card').forEach(el => {
    el.onkeydown = e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); el.click(); } };
  });
}

function toggleWord(id) {
  if (STATE.over) return;
  STATE.selected.has(id) ? STATE.selected.delete(id)
    : (STATE.selected.size < 4 && STATE.selected.add(id));
  renderGrid(); syncButtons();
}
function deselectAll() { STATE.selected.clear(); renderGrid(); syncButtons(); }

function submitGuess() {
  if (STATE.selected.size !== 4 || STATE.over) return;
  const picked = [...STATE.selected].map(id => STATE.words.find(w => w.id === id));
  const cats   = [...new Set(picked.map(w => w.catIdx))];
  if (cats.length === 1) {
    picked.forEach(w => { const el=document.getElementById(`wc-${w.id}`); if(el) el.classList.add('pop'); });
    setTimeout(() => {
      picked.forEach(w => { w.solved = true; });
      STATE.solvedCats.add(cats[0]); STATE.selected.clear();
      addSolvedRow(PUZZLE.categories[cats[0]], cats[0]);
      renderGrid(); syncButtons();
      if (STATE.solvedCats.size === PUZZLE.categories.length) endGame(true);
    }, 350);
  } else {
    const cc = {};
    picked.forEach(w => { cc[w.catIdx] = (cc[w.catIdx]||0)+1; });
    if (Math.max(...Object.values(cc)) === 3) toast('One away…');
    picked.forEach(w => {
      const el = document.getElementById(`wc-${w.id}`);
      if (el) { el.classList.add('shake'); el.addEventListener('animationend', ()=>el.classList.remove('shake'), {once:true}); }
    });
    STATE.mistakes++; syncMistakes(); STATE.selected.clear();
    setTimeout(() => { renderGrid(); syncButtons(); if (STATE.mistakes>=STATE.MAX_MISTAKES) endGame(false); }, 420);
  }
}

function addSolvedRow(cat) {
  const row = document.createElement('div');
  row.className = `solved-row ${COLOR_CLASS[cat.color]||'cat-yellow'}`;
  row.innerHTML = `<div class="solved-row-name">${safe(cat.name)}</div>
    <div class="solved-row-words">${cat.words.map(safe).join(' · ')}</div>
    ${cat.explanation?`<div class="solved-row-explanation">${cat.explanation}</div>`:''}`;
  document.getElementById('solved-rows').appendChild(row);
}

function shuffleGrid() {
  STATE.words = [...STATE.words.filter(w=>w.solved), ...shuffle(STATE.words.filter(w=>!w.solved))];
  STATE.selected.clear(); renderGrid(); syncButtons();
}

function endGame(won) {
  STATE.over = true;
  document.getElementById('game-result').innerHTML = won
    ? '🕯️ &nbsp;Excellent — all connections found.'
    : 'Better luck next week — see the answers below.';
  if (!won) {
    PUZZLE.categories.forEach((cat, ci) => {
      if (!STATE.solvedCats.has(ci)) {
        cat.words.forEach(t => { const w=STATE.words.find(x=>x.text===t&&!x.solved); if(w) w.solved=true; });
        STATE.solvedCats.add(ci); addSolvedRow(cat, ci);
      }
    }); renderGrid();
  }
  ['btn-shuffle','btn-deselect','btn-submit'].forEach(id=>document.getElementById(id).disabled=true);
}

function syncMistakes() {
  for (let i=0; i<STATE.MAX_MISTAKES; i++)
    document.getElementById(`mdot-${i}`)?.classList.toggle('spent', i>=STATE.MAX_MISTAKES-STATE.mistakes);
}
function syncButtons() {
  document.getElementById('btn-submit').disabled  = STATE.selected.size!==4 || STATE.over;
  document.getElementById('btn-deselect').disabled = STATE.selected.size===0  || STATE.over;
}
let toastTimer;
function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function safe(str) {
  const d=document.createElement('div'); d.appendChild(document.createTextNode(String(str))); return d.innerHTML;
}

document.addEventListener('DOMContentLoaded', init);
</script>
